<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier - Marketplace Produits Locaux</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/style-cart.css">
</head>
<body>
    <header>
        <h1>Marketplace Produits Locaux</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="catalogue.html">Catalogue</a>
            <a href="sellers.html">Vendeurs</a>
            <a href="contact.html">Contact</a>
            <a href="cart.html">Panier</a>
        </nav>
    </header>
    <main>
        <h2>Votre Panier</h2>
        <div style="background: #fff; padding: 1.5rem; border-radius: 8px; max-width: 600px; margin: 2rem auto;">
            <div style="display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 1rem; margin-bottom: 1rem;">
                <span>Statue en Ebène (x1)</span>
                <strong class="cart-item-price-display">45.00 €</strong>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 1.2rem;">
                <strong>Total</strong>
                <strong class="cart-item-price-display">45.00 €</strong>
            </div>
            <button style="width: 100%; padding: 1rem; background: var(--color-primary-green); color: white; border: none; border-radius: 4px; margin-top: 2rem; cursor: pointer;">Passer la commande</button>
        </div>
    </main>
</body>
</html>
